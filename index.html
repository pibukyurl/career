<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>피부결 채용 | 함께 만들 동료를 찾아요</title>
<meta name="description" content="제품이 아니라 생활로 피부를 바꾸는 채널, 피부결. 그 콘텐츠를 함께 만들 동료를 찾습니다." />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root{
    --accent:#2b59e0; --accent-dark:#1d44c2; --accent-50:#eef2fe; --accent-100:#dde6fd;
    --ink:#16181d; --ink-2:#5b6470; --ink-3:#9aa1ab;
    --line:#ecebe7; --bg-soft:#f8f7f5; --white:#fff;
    --shadow:0 1px 2px rgba(20,24,29,.04), 0 10px 30px rgba(20,24,29,.06);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--white); color:var(--ink);
    font-family:"Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  ul{margin:0; padding:0;} li{list-style:none;}
  .wrap{max-width:980px; margin:0 auto; padding:0 24px;}

  /* Header */
  header{position:sticky; top:0; z-index:50; background:rgba(255,255,255,.86);
    backdrop-filter:saturate(180%) blur(12px); border-bottom:1px solid var(--line);}
  .nav{display:flex; align-items:center; justify-content:space-between; height:64px;}
  .logo{display:flex; align-items:center; gap:9px; font-weight:800; font-size:19px; letter-spacing:-.02em;}
  .logo .mark{width:24px; height:24px; border-radius:8px;
    background:linear-gradient(140deg,var(--accent),#84a3f6); position:relative;}
  .logo .mark::after{content:""; position:absolute; inset:auto auto 6px 6px; width:8px; height:8px;
    border-radius:50%; background:#fff; opacity:.92;}
  .logo small{font-weight:500; color:var(--ink-2); font-size:15px;}
  .logo-img{height:26px; width:auto; display:block;}
  .menu{display:flex; gap:28px; align-items:center;}
  .menu a{color:var(--ink-2); font-size:15px; font-weight:500;}
  .menu a:hover{color:var(--ink);}
  .btn-pill{background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:9px 16px; font-size:14px; font-weight:700;}
  .btn-pill:hover{background:var(--accent-dark);}
  .menu-toggle{display:none; background:none; border:none;}

  /* Views */
  .view{display:none;} .view.active{display:block;}
  .view.anim{animation:fadeUp .45s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

  /* Hero */
  .hero{position:relative; overflow:hidden;
    background:linear-gradient(180deg,#f5f3ef 0%, #faf9f6 48%, #fff 100%);}
  .hero::before{content:""; position:absolute; top:-130px; right:-70px; width:440px; height:440px;
    background:radial-gradient(circle, rgba(43,89,224,.16), transparent 66%);}
  .hero-inner{position:relative; padding:78px 24px 34px;}
  .kicker{color:var(--accent); font-weight:700; font-size:14px; letter-spacing:.04em; margin:0 0 16px;}
  .hero h1{font-size:46px; line-height:1.22; letter-spacing:-.03em; font-weight:800; margin:0; max-width:660px;}
  .hero .lead{margin:20px 0 0; color:var(--ink-2); font-size:17px; max-width:560px; line-height:1.6;}

  /* Filters */
  .filters{display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:18px 0 44px;}
  .search{flex:1 1 300px; min-width:220px; position:relative;}
  .search svg{position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--ink-3);}
  .search input{width:100%; height:52px; border:1px solid var(--line); border-radius:14px;
    background:#fff; padding:0 16px 0 46px; font-size:15px; color:var(--ink); outline:none; box-shadow:var(--shadow);}
  .search input::placeholder{color:var(--ink-3);}
  .search input:focus{border-color:var(--accent);}
  .sel{position:relative;}
  .sel select{appearance:none; -webkit-appearance:none; height:52px; border:1px solid var(--line);
    border-radius:14px; background:#fff; padding:0 40px 0 16px; font-size:15px; font-weight:600;
    color:var(--ink-2); outline:none; box-shadow:var(--shadow); cursor:pointer;}
  .sel select:focus{border-color:var(--accent);}
  .sel::after{content:""; position:absolute; right:16px; top:50%; width:8px; height:8px;
    border-right:2px solid var(--ink-3); border-bottom:2px solid var(--ink-3);
    transform:translateY(-70%) rotate(45deg); pointer-events:none;}
  .reset{background:none; border:none; color:var(--ink-3); font-weight:600; font-size:15px; padding:8px;}
  .reset:hover{color:var(--ink-2);}

  /* List */
  .count{font-size:20px; font-weight:700; margin:0 0 8px; letter-spacing:-.02em;}
  .count b{color:var(--accent);}
  .job-list{border-top:1px solid var(--line); padding-bottom:96px;}
  .job{display:flex; align-items:center; justify-content:space-between; gap:16px; width:100%; color:var(--ink);
    text-align:left; background:none; border:none; border-bottom:1px solid var(--line);
    padding:26px 6px; transition:transform .15s ease, background .15s ease; border-radius:12px;}
  .job:hover{background:var(--bg-soft); transform:translateX(2px);}
  .job-title{font-size:20px; font-weight:700; letter-spacing:-.02em; margin:0 0 6px;}
  .job-meta{font-size:14px; color:var(--ink-3); margin:0;}
  .job-side{display:flex; align-items:center; gap:10px; flex-shrink:0;}
  .pill{background:var(--bg-soft); color:var(--ink-2); font-size:12.5px; font-weight:600;
    padding:5px 11px; border-radius:999px; white-space:nowrap;}
  .pill-hot{background:var(--accent); color:#fff;}
  .job-arrow{color:var(--ink-3); flex-shrink:0;}
  .empty{padding:60px 0; color:var(--ink-3); text-align:center; font-size:15px;}

  /* Detail */
  .subhero{background:linear-gradient(110deg,#2b59e0 0%, #5b82f0 58%, #84a3f6 100%); color:#fff;}
  .subhero .wrap{padding:42px 24px;}
  .subhero p{margin:0; font-size:22px; font-weight:700; letter-spacing:-.02em; text-align:center; opacity:.97;}
  .detail-wrap{padding:44px 24px 110px;}
  .link-back{display:inline-flex; align-items:center; gap:6px; color:var(--ink-3); font-weight:600;
    font-size:14px; background:none; border:none; padding:8px 0; margin-bottom:8px;}
  .link-back:hover{color:var(--ink-2);}
  .detail-grid{display:grid; grid-template-columns:1fr 300px; gap:52px; align-items:start;}
  .eyebrow{color:var(--accent); font-weight:700; font-size:15px; margin:0 0 14px;}
  .detail-title{font-size:38px; font-weight:800; letter-spacing:-.03em; line-height:1.2; margin:0 0 30px;}
  .role-card{border-radius:20px; padding:28px; background:linear-gradient(135deg,#eef2fe,#dde6fd);
    color:#1b357f; margin-bottom:42px;}
  .role-card .rp{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .role-card .rp span{background:rgba(255,255,255,.72); color:var(--accent-dark); font-weight:700;
    font-size:13px; padding:6px 12px; border-radius:999px;}
  .role-card .rname{font-size:28px; font-weight:800; letter-spacing:-.03em; line-height:1.2;}
  .role-card .rsub{margin-top:14px; font-size:14.5px; font-weight:600; color:#345099;}
  .block{margin-bottom:38px;}
  .block h2{font-size:21px; font-weight:700; letter-spacing:-.02em; margin:0 0 16px;}
  .block h3.team{font-size:16px; font-weight:700; color:var(--accent); margin:20px 0 10px;}
  .block ul li{position:relative; padding-left:18px; margin-bottom:11px; color:var(--ink-2);
    font-size:15.5px; line-height:1.65;}
  .block ul li::before{content:""; position:absolute; left:2px; top:11px; width:5px; height:5px;
    border-radius:50%; background:var(--accent);}
  .block .block-p{color:var(--ink-2); font-size:15.5px; line-height:1.7; margin:0 0 12px;}
  .block .block-p:last-child{margin-bottom:0;}
  .timeline{position:relative;}
  .tstep{position:relative; display:flex; gap:14px; padding-bottom:20px;}
  .tstep:last-child{padding-bottom:0;}
  .tstep:not(:last-child)::before{content:""; position:absolute; left:15px; top:32px; bottom:-2px; width:2px; background:var(--line);}
  .tnum{width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff;
    font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; z-index:1;}
  .tbody h4{margin:5px 0 4px; font-size:16px; font-weight:700; letter-spacing:-.01em;}
  .tbody p{margin:0; color:var(--ink-2); font-size:14.5px; line-height:1.6;}
  .detail-aside{position:sticky; top:88px;}
  .apply-box{border:1px solid var(--line); border-radius:18px; padding:22px; box-shadow:var(--shadow);}
  .apply-note{margin:14px 0 0; font-size:13.5px; color:var(--ink-3); text-align:center;}
  .btn-primary{display:inline-flex; align-items:center; justify-content:center;
    background:var(--accent); color:#fff; border:none; border-radius:14px; font-weight:700;
    font-size:16px; padding:16px; transition:background .15s ease;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-block{display:flex; width:100%;}
  .mobile-cta{display:none;}

  footer{border-top:1px solid var(--line); padding:36px 0; color:var(--ink-3); font-size:13px;}

  @media (max-width:880px){
    .menu{display:none;} .menu-toggle{display:block;}
    .detail-grid{grid-template-columns:1fr; gap:36px;}
    .detail-aside{display:none;}
    .hero-inner{padding:44px 24px 24px;}
    .hero h1{font-size:30px;} .hero .lead{font-size:15.5px; margin-top:16px;}
    .detail-title{font-size:30px;}
    .mobile-cta{display:block; position:fixed; left:0; right:0; bottom:0; z-index:60;
      background:#fff; border-top:1px solid var(--line); padding:12px 20px calc(12px + env(safe-area-inset-bottom));}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important; scroll-behavior:auto !important;}
  }
</style>
</head>

function buildOptions(){
  const cats = [...new Set(JOBS.map(j=>j.category))];
  const types = [...new Set(JOBS.map(j=>j.type))];
  fill($('fCat'),'모든 직군',cats);
  fill($('fType'),'모든 고용형태',types);
}
function fill(sel, allLabel, items){
  sel.innerHTML = '<option value="">'+allLabel+'</option>' +
    items.map(i=>'<option value="'+i+'">'+i+'</option>').join('');
}
function jobCard(job){
  const meta = job.skills.join(' · ');
  return '<button class="job" onclick="openDetail('+job.id+')">'+
    '<div><h3 class="job-title">'+job.title+'</h3><p class="job-meta">'+meta+'</p></div>'+
    '<div class="job-side">'+(job.tag?'<span class="pill pill-hot">'+job.tag+'</span>':'')+'<span class="pill">'+job.type+'</span>'+
    '<svg class="job-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg></div>'+
    '</button>';
}
function applyFilters(){
  const q = $('search').value.trim().toLowerCase();
  const cat = $('fCat').value, typ = $('fType').value;
  const out = JOBS.filter(j=>{
    const hay = (j.title+' '+j.category+' '+j.skills.join(' ')).toLowerCase();
    return (!q||hay.includes(q)) && (!cat||j.category===cat) && (!typ||j.type===typ);
  });
  $('count').textContent = out.length;
  $('jobList').innerHTML = out.length
    ? out.map(jobCard).join('')
    : '<p class="empty">조건에 맞는 공고가 없어요. 검색어나 필터를 바꿔보세요.</p>';
}
function resetFilters(){
  $('search').value=''; $('fCat').value=''; $('fType').value='';
  applyFilters();
}

/* ---------- 상세 ---------- */
function openDetail(id){
  currentId = id;
  const j = JOBS.find(x=>x.id===id);
  const li = arr=>'<ul>'+arr.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
  const para = arr=>arr.map(p=>'<p class="block-p">'+p+'</p>').join('');
  const blocks = (j.blocks||[]).map(b=>
    '<div class="block"><h2>'+b.h+'</h2>'+(b.body?para(b.body):'')+(b.items?li(b.items):'')+'</div>'
  ).join('');
  const proc = (j.process&&j.process.length) ?
    '<div class="block"><h2>채용 절차는 이렇게 진행돼요</h2><div class="timeline">'+
      j.process.map((s,i)=>'<div class="tstep"><div class="tnum">'+(i+1)+'</div>'+
        '<div class="tbody"><h4>'+s.t+'</h4>'+(s.d?'<p>'+s.d+'</p>':'')+'</div></div>').join('')+
    '</div></div>' : '';
  const note = j.applyNote || '평균 2주 안에 결과를 알려드려요.';

  $('view-detail').innerHTML =
    '<div class="subhero"><div class="wrap"><p>'+j.banner+'</p></div></div>'+
    '<div class="wrap detail-wrap">'+
      '<button class="link-back" onclick="goList()">‹ 전체 공고</button>'+
      '<div class="detail-grid">'+
        '<div>'+
          '<p class="eyebrow">피부결 · '+j.type+'</p>'+
          '<h1 class="detail-title">'+j.title+'</h1>'+
          '<div class="role-card"><div class="rp"><span>피부결</span><span>'+j.category+'</span></div>'+
            '<div class="rname">'+j.roleName+'</div>'+
            '<div class="rsub">'+j.deadline+'</div></div>'+
          blocks+
          proc+
        '</div>'+
        '<aside class="detail-aside"><div class="apply-box">'+
          '<a class="btn-primary btn-block" href="'+j.applyUrl+'" target="_blank" rel="noopener">지원하기</a>'+
          '<p class="apply-note">'+note+'</p>'+
        '</div></aside>'+
      '</div>'+
    '</div>'+
    '<div class="mobile-cta"><a class="btn-primary btn-block" href="'+j.applyUrl+'" target="_blank" rel="noopener">지원하기</a></div>';

  showView('detail');
}

/* ---------- 화면 전환 ---------- */
function showView(name){
  views.forEach(v=>{ v.classList.remove('active'); v.classList.remove('anim'); });
  const el = $('view-'+name);
  el.classList.add('active');
  window.scrollTo({top:0, behavior:REDUCED?'auto':'smooth'});
  if(!REDUCED){ void el.offsetWidth; el.classList.add('anim'); }
}
function goList(){ showView('list'); }

/* ---------- 시작 ---------- */
buildOptions();
applyFilters();
['search','fCat','fType'].forEach(id=>{
  $(id).addEventListener(id==='search'?'input':'change', applyFilters);
});
</script>
</body>
</html>
